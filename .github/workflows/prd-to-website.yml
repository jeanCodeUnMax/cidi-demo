name: PRD to Website Generator

# Permissions nécessaires pour pousser les changements
permissions:
  contents: write

# Déclenchement: quand un fichier PRD est poussé dans prd/
on:
  push:
    paths:
      - 'prd/**/*.md'
    branches:
      - master
      - main
  workflow_dispatch:  # Permet aussi le déclenchement manuel

jobs:
  generate-website:
    runs-on: ubuntu-latest
    timeout-minutes: 10  # Réduit car plus de Docker à télécharger
    
    steps:
      # 1. Checkout du repository
      - name: Checkout repository
        uses: actions/checkout@v4  # v4 = Node.js 24 compatible

      # 2. Configurer Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. Installer les dépendances Python
      - name: Install Python dependencies
        run: |
          pip install requests

      # 4. Installer et démarrer Ollama
      - name: Install and start Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          # Démarrer le serveur Ollama en arrière-plan
          ollama serve &
          # Attendre que le serveur soit prêt
          sleep 5
          curl -s http://localhost:11434/api/tags || echo "Serveur non prêt"

      # 5. Générer le site web via Ollama Cloud (model:cloud = pas de clé API)
      - name: Generate website from PRD
        env:
          OLLAMA_HOST: http://localhost:11434
          MODEL_NAME: minimax-m2.7:cloud
          PRD_DIR: prd
          OUTPUT_DIR: output
        run: |
          python scripts/generate_website.py

      # 5. Commit et push du résultat
      - name: Commit generated website
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add output/
          git diff --quiet && git diff --staged --quiet || git commit -m "🤀 Site web généré à partir du PRD [skip ci]"
          git push

      # 7. Afficher le résultat
      - name: Show generated files
        run: |
          echo "Fichiers générés:"
          ls -la output/
