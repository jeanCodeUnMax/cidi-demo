name: Self-Healing AI Orchestrator

# Orchestrateur avec auto-réparation et rollback
on:
  push:
    paths:
      - 'prd/**/*.md'
      - 'brainstorming/**/*.md'
      - 'ideas/**/*.md'
    branches:
      - master
      - main
  workflow_dispatch:
    inputs:
      input_file:
        description: 'Fichier à traiter (optionnel)'
        required: false

permissions:
  contents: write

jobs:
  orchestrate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      # 1. Checkout
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. Install dependencies
      - name: Install dependencies
        run: pip install requests pyyaml

      # 4. Install Ollama
      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve &
          sleep 5
          ollama pull llama3.2:1b

      # 4.5 Setup API Keys (from secrets)
      - name: Setup API Keys
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          # Update llm_providers.json with secrets
          if [ -n "$OPENROUTER_API_KEY" ]; then
            jq '.api_keys.openrouter = "'"$OPENROUTER_API_KEY"'"' llm_providers.json > tmp.json && mv tmp.json llm_providers.json
          fi
          if [ -n "$MISTRAL_API_KEY" ]; then
            jq '.api_keys.mistral = "'"$MISTRAL_API_KEY"'"' llm_providers.json > tmp.json && mv tmp.json llm_providers.json
          fi
          if [ -n "$GROQ_API_KEY" ]; then
            jq '.api_keys.groq = "'"$GROQ_API_KEY"'"' llm_providers.json > tmp.json && mv tmp.json llm_providers.json
          fi

      # 5. Initialize State
      - name: Initialize State
        run: |
          python -c "
          from system.state_manager import StateManager
          sm = StateManager('.')
          sm.update_phase('research', 'running')
          print('State initialized')
          "

      # 6. Detect Input
      - name: Detect Input File
        id: detect
        run: |
          # Si input manuel, utiliser ce fichier
          if [ -n "${{ github.event.inputs.input_file }}" ]; then
            FILE="${{ github.event.inputs.input_file }}"
          else
            # Utiliser les fichiers modifiés dans le commit actuel
            # GitHub fournit la liste des fichiers via l'API
            FILES_ADDED=$(echo '${{ github.event.commits[0].added }}' | jq -r '.[]' 2>/dev/null | grep -E '\.md$' | head -1)
            FILES_MODIFIED=$(echo '${{ github.event.commits[0].modified }}' | jq -r '.[]' 2>/dev/null | grep -E '\.md$' | head -1)
            
            # Priorité aux fichiers ajoutés, puis modifiés
            if [ -n "$FILES_ADDED" ] && [ -f "$FILES_ADDED" ]; then
              FILE="$FILES_ADDED"
            elif [ -n "$FILES_MODIFIED" ] && [ -f "$FILES_MODIFIED" ]; then
              FILE="$FILES_MODIFIED"
            else
              # Fallback: chercher dans le diff du dernier commit
              FILE=$(git diff --name-only HEAD~1 HEAD 2>/dev/null | grep -E '\.md$' | grep -E '(prd|ideas|brainstorming)/' | head -1)
              
              # Si toujours rien, utiliser le fichier par défaut
              if [ -z "$FILE" ] || [ ! -f "$FILE" ]; then
                FILE="prd/exemple-site-portfolio.md"
              fi
            fi
          fi
          
          echo "Detected file: $FILE"
          echo "file=$FILE" >> $GITHUB_OUTPUT
          
          # Vérifier que le fichier existe
          if [ ! -f "$FILE" ]; then
            echo "::error::Fichier non trouvé: $FILE"
            exit 1
          fi

      # 7. Execute with Auto-Healing
      - name: Execute with Auto-Healing
        id: execute
        env:
          OLLAMA_HOST: http://localhost:11434
          MODEL_NAME: minimax-m2.7:cloud
          INPUT_FILE: ${{ steps.detect.outputs.file }}
        run: |
          echo "📄 Processing: $INPUT_FILE"
          
          python -c "
          import sys
          import os
          sys.path.insert(0, '.')
          
          input_file = os.environ.get('INPUT_FILE', 'prd/exemple-site-portfolio.md')
          print(f'Processing: {input_file}')
          
          from system.state_manager import StateManager
          from system.auto_healing import AutoHealingSystem
          
          # Initialize
          sm = StateManager('.')
          healer = AutoHealingSystem(sm)
          
          # Read PRD
          with open(input_file, 'r', encoding='utf-8') as f:
              prd_content = f.read()
          
          print(f'PRD loaded: {len(prd_content)} characters')
          
          # Update state
          sm.update_phase('research', 'running')
          
          # Try to use multi-agent orchestrator
          try:
              from scripts.multi_agent_orchestrator import MultiAgentOrchestrator
              
              def run_orchestrator():
                  orch = MultiAgentOrchestrator()
                  return orch.run(prd_content)
              
              def fix_timeout(error, attempt):
                  return 'Simplified prompt and increased timeout'
              
              result = healer.execute_with_healing(
                  'orchestration',
                  run_orchestrator,
                  fix_timeout
              )
              
          except Exception as e:
              print(f'Multi-agent failed, using fallback: {e}')
              
              # Fallback: use simple generator
              from scripts.generate_website import call_ollama_cloud, extract_html, save_output
              
              response = call_ollama_cloud(prd_content)
              html = extract_html(response)
              output_path = save_output(html, os.path.basename(input_file))
              
              result = {'success': True, 'result': str(output_path), 'attempts': 1}
          
          # Update state
          if result['success']:
              sm.update_phase('development', 'success')
              print('✅ Orchestration succeeded')
          else:
              sm.update_phase('development', 'failed', result.get('error'))
              print('❌ Orchestration failed')
          
          # Save report
          import json
          with open('logs/execution_report.json', 'w') as f:
              json.dump({
                  'result': result,
                  'fixes': healer.generate_fix_report(),
                  'state': sm.get_dev_book()
              }, f, indent=2)
          "
          
          # Check result
          if [ -f "logs/execution_report.json" ]; then
            SUCCESS=$(cat logs/execution_report.json | jq -r '.result.success')
            if [ "$SUCCESS" != "true" ]; then
              echo "::warning::Execution failed, check logs/execution_report.json"
            fi
          fi

      # 8. Commit Results (if success)
      - name: Commit Results
        if: success()
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Pull les changements récents pour éviter les conflits
          git pull --rebase origin master || git pull --rebase origin main || true
          
          git add output/ .state/ logs/
          git diff --quiet && git diff --staged --quiet || \
            git commit -m "🤖 Project generated with auto-healing [skip ci]"
          
          # Push avec retry en cas de conflit
          for i in 1 2 3; do
            if git push; then
              echo "✓ Push successful"
              break
            else
              echo "⚠️ Push failed, retrying... (attempt $i)"
              git pull --rebase origin master || git pull --rebase origin main || true
              sleep 5
            fi
          done

      # 9. Cleanup on Success
      - name: Cleanup on Success
        if: success()
        run: |
          echo "🧹 Cleaning up..."
          # Archive old logs
          mkdir -p logs/archive
          find logs -name "*.log" -mtime +7 -exec mv {} logs/archive/ \; 2>/dev/null || true
          echo "✓ Cleanup complete"

      # 10. Create Debug Snapshot on Failure
      - name: Create Debug Snapshot
        if: failure()
        run: |
          echo "📸 Creating debug snapshot..."
          mkdir -p debug_snapshots
          
          # Save current state
          cp -r .state debug_snapshots/state_$(date +%s) 2>/dev/null || true
          cp -r logs debug_snapshots/logs_$(date +%s) 2>/dev/null || true
          
          # Create debug report
          cat > debug_snapshots/DEBUG_REPORT.md << EOF
          # Debug Report - $(date)
          
          ## Failed Step
          \`\`\`
          ${{ job.status }}
          \`\`\`
          
          ## Files Modified
          \`\`\`
          $(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "N/A")
          \`\`\`
          
          ## State
          \`\`\`json
          $(cat .state/current_state.json 2>/dev/null || echo "N/A")
          \`\`\`
          EOF
          
          echo "✓ Debug snapshot created in debug_snapshots/"

      # 11. Generate Final Report
      - name: Generate Report
        if: always()
        run: |
          # Générer le STATUS.md visible
          python scripts/generate_status.py
          
          echo "## 🤖 Orchestration Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -f "logs/execution_report.json" ]; then
            cat logs/execution_report.json | jq -r '
              "### Status: " + (if .result.success then "✅ Success" else "❌ Failed" end),
              "",
              "**Attempts**: " + (.result.attempts | tostring),
              "",
              "**Fixes Applied**: " + (.fixes.total_fixes | tostring),
              "",
              "### State",
              "```json",
              .state.phases,
              "```"
            ' >> $GITHUB_STEP_SUMMARY || true
          fi

      # 12. Commit Status Report
      - name: Commit Status Report
        if: always()
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git pull --rebase origin master || git pull --rebase origin main || true
          
          git add STATUS.md logs/ .state/
          git diff --quiet && git diff --staged --quiet || \
            git commit -m "📊 Update STATUS.md [skip ci]"
          
          git push || true
