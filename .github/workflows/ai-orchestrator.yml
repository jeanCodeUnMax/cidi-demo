name: AI Orchestrator

# Déclenchement intelligent sur différents types de fichiers
on:
  push:
    paths:
      - 'prd/**/*.md'
      - 'brainstorming/**/*.md'
      - 'ideas/**/*.md'
      - 'projects/**/*.md'
    branches:
      - master
      - main
  workflow_dispatch:
    inputs:
      input_file:
        description: 'Fichier à traiter (optionnel)'
        required: false

permissions:
  contents: write

jobs:
  detect-and-execute:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      # 1. Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. Installer les dépendances
      - name: Install dependencies
        run: |
          pip install requests pyyaml

      # 4. Installer et démarrer Ollama
      - name: Install and start Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve &
          sleep 5
          curl -s http://localhost:11434/api/tags

      # 5. Détecter le fichier à traiter
      - name: Detect input file
        id: detect
        run: |
          # Si input manuel, utiliser ce fichier
          if [ -n "${{ github.event.inputs.input_file }}" ]; then
            echo "file=${{ github.event.inputs.input_file }}" >> $GITHUB_OUTPUT
          else
            # Trouver le dernier fichier modifié (gérer le premier commit)
            LAST_FILE=$(git diff --name-only HEAD^ HEAD 2>/dev/null || git diff --name-only HEAD~1 HEAD 2>/dev/null || git log --oneline --name-only -1 | tail -n +2 | head -1)
            
            # Vérifier que c'est un fichier .md valide
            if [ -n "$LAST_FILE" ] && [ -f "$LAST_FILE" ]; then
              echo "file=$LAST_FILE" >> $GITHUB_OUTPUT
            else
              # Fallback: utiliser un fichier exemple
              echo "file=prd/exemple-site-portfolio.md" >> $GITHUB_OUTPUT
            fi
          fi
          
          echo "Detected file: $(cat $GITHUB_OUTPUT | grep file | cut -d= -f2)"

      # 6. Valider le fichier
      - name: Validate input file
        run: |
          FILE="${{ steps.detect.outputs.file }}"
          if [ ! -f "$FILE" ]; then
            echo "::error::Fichier non trouvé: $FILE"
            exit 1
          fi
          echo "✓ Fichier validé: $FILE"

      # 6. Analyser et planifier
      - name: Analyze and plan
        env:
          OLLAMA_HOST: http://localhost:11434
          MODEL_NAME: minimax-m2.7:cloud
        id: plan
        run: |
          python scripts/orchestrator.py "${{ steps.detect.outputs.file }}" > plan.json
          cat plan.json

      # 7. Exécuter les tâches
      - name: Execute tasks
        env:
          OLLAMA_HOST: http://localhost:11434
          MODEL_NAME: minimax-m2.7:cloud
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Créer le dossier de sortie
          mkdir -p output/${{ steps.plan.outputs.project_name }}
          
          # Exécuter l'orchestrateur
          python scripts/orchestrator.py "${{ steps.detect.outputs.file }}" \
            --output output/${{ steps.plan.outputs.project_name }}

      # 8. Commit et push
      - name: Commit results
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add output/
          git diff --quiet && git diff --staged --quiet || \
            git commit -m "🤖 Projet généré par l'orchestrateur IA [skip ci]"
          git push

      # 9. Générer un rapport
      - name: Generate report
        run: |
          echo "## 🤖 Rapport d'Exécution" > report.md
          echo "" >> report.md
          echo "**Fichier traité**: ${{ steps.detect.outputs.file }}" >> report.md
          echo "" >> report.md
          echo "**Projet créé**: output/${{ steps.plan.outputs.project_name }}" >> report.md
          echo "" >> report.md
          echo "### Tâches Exécutées" >> report.md
          cat plan.json | jq -r '.tasks[] | "- " + .description' >> report.md || true
          
          cat report.md >> $GITHUB_STEP_SUMMARY
