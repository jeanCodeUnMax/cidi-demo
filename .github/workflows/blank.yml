# Test de cleanup Docker - Self-hosted safe

name: Docker Cleanup Test

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  test-cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 5  # Sécurité: tue le job après 5 min
    
    steps:
      - uses: actions/checkout@v2

      # Test 1: Lancer un conteneur nginx en arrière-plan
      - name: Start nginx container
        run: |
          echo "🚀 Démarrage nginx..."
          docker run -d --name test-nginx -p 8080:80 nginx:alpine
          
          # Attendre que nginx soit prêt
          sleep 3
          curl -s http://localhost:8080 | head -5 || echo "Nginx non accessible"
          
          echo "✅ Nginx actif sur port 8080"

      # Test 2: Vérifier que le conteneur tourne
      - name: Verify container running
        run: |
          echo "📊 État des conteneurs:"
          docker ps -a

      # CLEANUP - Toujours exécuté (self-hosted safe)
      - name: Cleanup Docker
        if: always()
        run: |
          echo "🧹 Nettoyage..."
          
          # Arrêter et supprimer nginx
          docker stop test-nginx 2>/dev/null || true
          docker rm -f test-nginx 2>/dev/null || true
          
          # Libérer le port 8080
          fuser -k 8080/tcp 2>/dev/null || true
          
          # Nettoyage total
          docker system prune -af --volumes 2>/dev/null || true
          
          echo "✅ Cleanup terminé"
          echo "📊 Vérification finale:"
          docker ps -a || echo "Aucun conteneur"
