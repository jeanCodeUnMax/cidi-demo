<!DOCTYPE html>
<html lang="fr">
<head>

    <title>Super Mario Bros. 8-bit</title>
    <style>
        :root {
            --nes-red: #FF0000;
            --nes-green: #00FF00;
            --nes-blue: #0000FF;
            --nes-yellow: #FFFF00;
            --nes-brown: #8B4513;
            --nes-black: #000000;
            --nes-white: #FFFFFF;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: var(--nes-black);
            font-family: 'Press Start 2P', cursive;
            overflow: hidden;
            touch-action: none;
        }

        #game-container {
            position: relative;
            width: 768px;
            height: 720px;
            background-color: var(--nes-black);
            border: 4px solid var(--nes-yellow);
            box-shadow: 0 0 20px rgba(255, 255, 0, 0.7);
        }

        #game-canvas {
            background-color: var(--nes-blue);
            display: block;
        }

        #ui-panel {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--nes-yellow);
            font-size: 16px;
            z-index: 10;
        }

        #score-display, #lives-display {
            background-color: rgba(0, 0, 0, 0.7);
            padding: 5px 10px;
            border-radius: 3px;
            text-shadow: 1px 1px 2px var(--nes-black);
        }

        #game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(0, 0, 0, 0.9);
            color: var(--nes-yellow);
            padding: 20px;
            border: 2px solid var(--nes-red);
            text-align: center;
            display: none;
            font-size: 24px;
            text-shadow: 2px 2px 4px var(--nes-black);
        }

        #restart-btn {
            margin-top: 20px;
            padding: 10px 20px;
            background-color: var(--nes-red);
            color: var(--nes-white);
            border: none;
            border-radius: 5px;
            font-family: 'Press Start 2P', cursive;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s;
        }

        #restart-btn:hover {
            background-color: var(--nes-yellow);

        }

            top: 10px;

            color: var(--nes-white);
            border: none;
            padding: 5px 10px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 14px;
        }

            background-color: var(--nes-green);

            #game-container {

            }

            #game-container {

        }
    </style>

</head>
<body>
    <div id="game-container">
        <canvas id="game-canvas" width="256" height="240"></canvas>

        <div id="ui-panel">
            <div id="score-display">SCORE: 0</div>
            <div id="lives-display">LIVES: 3</div>
            <button id="sound-toggle">SON: ON</button>
        </div>

        <div id="game-over">
            <h1>GAME OVER</h1>
            <p>Score final: <span id="final-score">0</span></p>
            <button id="restart-btn">RESTART</button>
        </div>
    </div>

    <script src="game.js" type="module"></script>
    <script src="audio.js" type="module"></script>
    <script src="sprites.js" type="module"></script>
    <script src="levels.js" type="module"></script>
    <script>
        // Initialisation du jeu
        document.addEventListener('DOMContentLoaded', () => {
            const canvas = document.getElementById('game-canvas');
            const ctx = canvas.getContext('2d');
            const gameContainer = document.getElementById('game-container');
            const gameOverScreen = document.getElementById('game-over');
            const finalScoreDisplay = document.getElementById('final-score');
            const scoreDisplay = document.getElementById('score-display');
            const livesDisplay = document.getElementById('lives-display');
            const soundToggle = document.getElementById('sound-toggle');
            const restartBtn = document.getElementById('restart-btn');

            // Initialisation du jeu
            const game = new GameEngine(ctx, canvas, gameContainer, gameOverScreen, finalScoreDisplay);
            game.init();

            // Gestion des contrôles
            game.setupControls();

            // Gestion du son
            let soundEnabled = true;
            soundToggle.addEventListener('click', () => {
                soundEnabled = !soundEnabled;
                soundToggle.textContent = `SON: ${soundEnabled ? 'ON' : 'OFF'}`;
                game.audio.setMuted(!soundEnabled);
            });

            // Écouteurs d'événements
            restartBtn.addEventListener('click', () => {
                game.reset();
                gameOverScreen.style.display = 'none';
            });

            // Gestion de la taille de l'écran
            function resizeCanvas() {
                const containerWidth = gameContainer.clientWidth;
                const containerHeight = gameContainer.clientHeight;
                const scale = Math.min(containerWidth / 256, containerHeight / 240);
                canvas.style.width = `${256 * scale}px`;
                canvas.style.height = `${240 * scale}px`;
                canvas.width = 256;
                canvas.height = 240;
            }

            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();
        });
    </script>
</body>
</html>
